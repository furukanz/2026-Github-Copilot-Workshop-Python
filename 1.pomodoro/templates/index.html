<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ポモドーロタイマー</title>
        <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
        <div class="app-bg">
            <div class="card">
                <header class="card-header">
                    <h1>ポモドーロタイマー</h1>
                </header>

                <main class="card-body">
                    <div class="status">作業中</div>

                    <div class="ring-wrap">
                        <svg class="progress-ring" width="220" height="220" viewBox="0 0 220 220">
                            <defs>
                                <linearGradient id="grad" x1="0%" x2="100%" y1="0%" y2="100%">
                                    <stop offset="0%" stop-color="#6f63f4" />
                                    <stop offset="100%" stop-color="#7eb0ff" />
                                </linearGradient>
                            </defs>
                            <circle class="ring-bg" cx="110" cy="110" r="96" fill="none" stroke-width="18" />
                            <circle class="ring" id="progress" cx="110" cy="110" r="96" fill="none" stroke-width="18" stroke-linecap="round" stroke="url(#grad)" />
                        </svg>
                        <div class="time-center" id="time">
                            <span id="minutes">25</span>:<span id="seconds">00</span>
                        </div>
                    </div>

                    <div class="controls">
                        <button id="start" class="btn primary">開始</button>
                        <button id="reset" class="btn outline">リセット</button>
                    </div>
                </main>

                <footer class="card-footer">
                    <div class="progress-summary">
                        <div class="summary-item">
                            <div class="label">今日の進捗</div>
                            <div class="value">4</div>
                            <div class="sub">完了</div>
                        </div>
                        <div class="summary-item">
                            <div class="label">集中時間</div>
                            <div class="value">1時間40分</div>
                        </div>
                    </div>
                </footer>
            </div>
        </div>
    <script src="/static/js/timer.js"></script>
</body>
</html>
